models:
  - name: national_hospitalisations
    columns:
      - name: date
        description: '{{ doc("date") }}'
        data_tests:
          - not_null
      - name: country_code
        description: '{{ doc("country_code") }}'
        data_tests:
          - accepted_values:
              arguments:
                values: ['ITA']
          - not_null

      - name: active_cases
        description: '{{ doc("active_cases") }}'
        data_tests:
          - not_null
          - greater_than_zero
          - equals_sum_of_columns:
              arguments:
                columns:
                  - isolating_at_home
                  - hospitalised
                  - recovering_with_symptoms
                  - in_intensive_care
              config:
                severity: warn
      - name: isolating_at_home
        description: '{{ doc("isolating_at_home") }}'
        data_tests:
          - not_null
          - greater_than_zero
      - name: hospitalised
        description: '{{ doc("hospitalised") }}'
        data_tests:
          - not_null
          - greater_than_zero
      - name: recovering_with_symptoms
        description: '{{ doc("recovering_with_symptoms") }}'
        data_tests:
          - not_null
          - greater_than_zero
      - name: in_intensive_care
        description: '{{ doc("in_intensive_care") }}'
        data_tests:
          - not_null
          - greater_than_zero
      - name: entering_intensive_care
        description: '{{ doc("entering_intensive_care") }}'
        data_tests:
          - greater_than_zero:
              config:
                severity: warn
      - name: leaving_intensive_care
        description: '{{ doc("leaving_intensive_care") }}'
        data_tests:
          - greater_than_zero:
              config:
                severity: warn

      - name: notes_on_cases
        description: '{{ doc("notes_on_cases") }}'
      - name: notes
        description: '{{ doc("notes") }}'

  - name: regional_hospitalisations
    columns:
      - name: date
        description: '{{ doc("date") }}'
        data_tests:
          - not_null
      - name: region_code
        description: '{{ doc("region_code") }}'
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('region')
                field: region_code

      - name: active_cases
        description: '{{ doc("active_cases") }}'
        data_tests:
          - not_null
          - greater_than_zero
          - equals_sum_of_columns:
              arguments:
                columns:
                  - isolating_at_home
                  - hospitalised
                  - recovering_with_symptoms
                  - in_intensive_care
              config:
                severity: warn
      - name: isolating_at_home
        description: '{{ doc("isolating_at_home") }}'
        data_tests:
          - not_null
          - greater_than_zero
      - name: hospitalised
        description: '{{ doc("hospitalised") }}'
        data_tests:
          - not_null
          - greater_than_zero
      - name: recovering_with_symptoms
        description: '{{ doc("recovering_with_symptoms") }}'
        data_tests:
          - not_null
          - greater_than_zero
      - name: in_intensive_care
        description: '{{ doc("in_intensive_care") }}'
        data_tests:
          - not_null
          - greater_than_zero
      - name: entering_intensive_care
        description: '{{ doc("entering_intensive_care") }}'
        data_tests:
          - greater_than_zero:
              config:
                severity: warn
      - name: leaving_intensive_care
        description: '{{ doc("leaving_intensive_care") }}'
        data_tests:
          - greater_than_zero:
              config:
                severity: warn

      - name: notes_on_cases
        description: '{{ doc("notes_on_cases") }}'
      - name: notes
        description: '{{ doc("notes") }}'
