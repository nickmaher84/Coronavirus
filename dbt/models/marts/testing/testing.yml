models:
  - name: national_testing
    columns:
      - name: date
        description: '{{ doc("date") }}'
        data_tests:
          - not_null
      - name: country_code
        description: '{{ doc("country_code") }}'
        data_tests:
          - accepted_values:
              arguments:
                values: ['ITA']
          - not_null

      - name: total_tests
        description: '{{ doc("total_tests") }}'
        data_tests:
          - not_null
          - greater_than_zero
          - equals_sum_of_columns:
              arguments:
                columns:
                  - total_molecular_tests
                  - total_rapid_antigen_tests
      - name: total_molecular_tests
        description: '{{ doc("total_molecular_tests") }}'
        data_tests:
          - not_null
          - greater_than_zero
      - name: total_rapid_antigen_tests
        description: '{{ doc("total_rapid_antigen_tests") }}'
        data_tests:
          - not_null
          - greater_than_zero
      - name: total_cases
        description: '{{ doc("total_cases") }}'
        data_tests:
          - not_null
          - greater_than_zero
          - equals_sum_of_columns:
              arguments:
                columns:
                  - total_cases_from_molecular_tests
                  - total_cases_from_rapid_antigen_tests
              config:
                severity: warn
      - name: total_cases_from_molecular_tests
        description: '{{ doc("total_cases_from_molecular_tests") }}'
        data_tests:
          - not_null
          - greater_than_zero
      - name: total_cases_from_rapid_antigen_tests
        description: '{{ doc("total_cases_from_rapid_antigen_tests") }}'
        data_tests:
          - not_null
          - greater_than_zero

      - name: new_tests
        description: '{{ doc("new_tests") }}'
        data_tests:
          - not_null
          - greater_than_zero:
              config:
                severity: warn
          - equals_sum_of_columns:
              arguments:
                columns:
                  - new_molecular_tests
                  - new_rapid_antigen_tests
      - name: new_molecular_tests
        description: '{{ doc("new_molecular_tests") }}'
        data_tests:
          - not_null
          - greater_than_zero:
              config:
                severity: warn
      - name: new_rapid_antigen_tests
        description: '{{ doc("new_rapid_antigen_tests") }}'
        data_tests:
          - not_null
          - greater_than_zero:
              config:
                severity: warn
      - name: new_cases
        description: '{{ doc("new_cases") }}'
        data_tests:
          - not_null
          - greater_than_zero
          - equals_sum_of_columns:
              arguments:
                columns:
                  - new_cases_from_molecular_tests
                  - new_cases_from_rapid_antigen_tests
              config:
                severity: warn
      - name: new_cases_from_molecular_tests
        description: '{{ doc("new_cases_from_molecular_tests") }}'
        data_tests:
          - not_null
          - greater_than_zero:
              config:
                severity: warn
      - name: new_cases_from_rapid_antigen_tests
        description: '{{ doc("new_cases_from_rapid_antigen_tests") }}'
        data_tests:
          - not_null
          - greater_than_zero:
              config:
                severity: warn

      - name: notes_on_tests
        description: '{{ doc("notes_on_tests") }}'
      - name: notes_on_cases
        description: '{{ doc("notes_on_cases") }}'
      - name: notes
        description: '{{ doc("notes") }}'
    data_tests:
      - multicolumn_unique:
          arguments:
            columns:
              - date
              - country_code

  - name: regional_testing
    columns:
      - name: date
        description: '{{ doc("date") }}'
        data_tests:
          - not_null
      - name: region_code
        description: '{{ doc("region_code") }}'
