      - name: total_cases_from_molecular_tests
        description: '{{ doc("total_cases_from_molecular_tests") }}'
        data_tests:
          - not_null
      - name: total_cases_from_rapid_antigen_tests
        description: '{{ doc("total_cases_from_rapid_antigen_tests") }}'
