models:
  - name: national_screening
    columns:
      - name: date
        description: '{{ doc("date") }}'
        data_tests:
          - not_null
      - name: country_code
        description: '{{ doc("country_code") }}'
        data_tests:
          - accepted_values:
              arguments:
                values: ['ITA']
          - not_null

      - name: total_cases
        description: '{{ doc("total_cases") }}'
        data_tests:
          - not_null
          - greater_than_zero
          - equals_sum_of_columns:
              arguments:
                columns:
                  - total_cases_from_diagnosis
                  - total_cases_from_screening
              config:
                severity: warn
      - name: total_cases_from_diagnosis
        description: '{{ doc("total_cases_from_diagnosis") }}'
        data_tests:
          - not_null
          - greater_than_zero
      - name: total_cases_from_screening
        description: '{{ doc("total_cases_from_screening") }}'
        data_tests:
          - not_null
          - greater_than_zero

      - name: new_cases
        description: '{{ doc("new_cases") }}'
        data_tests:
          - not_null
          - greater_than_zero
          - equals_sum_of_columns:
              arguments:
                columns:
                  - new_cases_from_diagnosis
                  - new_cases_from_screening
              config:
                severity: warn
      - name: new_cases_from_diagnosis
        description: '{{ doc("new_cases_from_diagnosis") }}'
        data_tests:
          - not_null:
              config:
                error_if: ">1"
          - greater_than_zero:
              config:
                severity: warn
      - name: new_cases_from_screening
        description: '{{ doc("new_cases_from_screening") }}'
        data_tests:
          - not_null:
              config:
                error_if: ">1"
          - greater_than_zero:
              config:
                severity: warn

      - name: notes_on_tests
        description: '{{ doc("notes_on_tests") }}'
      - name: notes_on_cases
        description: '{{ doc("notes_on_cases") }}'
      - name: notes
        description: '{{ doc("notes") }}'
    data_tests:
      - multicolumn_unique:
          arguments:
            columns:
              - date
              - country_code

  - name: regional_screening
    columns:
      - name: date
        description: '{{ doc("date") }}'
        data_tests:
          - not_null
      - name: region_code
        description: '{{ doc("region_code") }}'
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('region')
                field: region_code

      - name: total_cases
        description: '{{ doc("total_cases") }}'
        data_tests:
          - not_null
          - greater_than_zero
          - equals_sum_of_columns:
              arguments:
                columns:
                  - total_cases_from_diagnosis
                  - total_cases_from_screening
              config:
                severity: warn
      - name: total_cases_from_diagnosis
        description: '{{ doc("total_cases_from_diagnosis") }}'
        data_tests:
          - not_null
          - greater_than_zero
      - name: total_cases_from_screening
        description: '{{ doc("total_cases_from_screening") }}'
        data_tests:
          - not_null
          - greater_than_zero

      - name: new_cases
        description: '{{ doc("new_cases") }}'
        data_tests:
          - not_null
          - greater_than_zero
          - equals_sum_of_columns:
              arguments:
                columns:
                  - new_cases_from_diagnosis
                  - new_cases_from_screening
              config:
                severity: warn
      - name: new_cases_from_diagnosis
        description: '{{ doc("new_cases_from_diagnosis") }}'
        data_tests:
          - not_null:
              config:
                error_if: ">21"
          - greater_than_zero:
              config:
                severity: warn
      - name: new_cases_from_screening
        description: '{{ doc("new_cases_from_screening") }}'
        data_tests:
          - not_null:
              config:
                error_if: ">21"
          - greater_than_zero:
              config:
                severity: warn

      - name: notes_on_tests
        description: '{{ doc("notes_on_tests") }}'
      - name: notes_on_cases
        description: '{{ doc("notes_on_cases") }}'
      - name: notes
        description: '{{ doc("notes") }}'
    data_tests:
      - multicolumn_unique:
          arguments:
            columns:
              - date
              - region_code
